<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoaJS Auth System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main app shell that switches between authentication and profile screens. -->
    <div class="container">
        <!-- Auth Section -->
        <div id="auth-section" class="card fade-in">
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle">Please login to continue</p>

            <form id="auth-form">
                <div class="input-group" id="name-group" style="display: none;">
                    <label for="name">Full Name <span class="required-star" aria-hidden="true">*</span></label>
                    <input type="text" id="name" placeholder="John Doe">
                    <span class="field-error" id="name-error"></span>
                </div>

                <div class="input-group">
                    <label for="email">Email Address <span class="required-star" aria-hidden="true">*</span></label>
                    <input type="email" id="email" required placeholder="name@company.com">
                    <span class="field-error" id="email-error"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password <span class="required-star" aria-hidden="true">*</span></label>
                    <div class="password-field">
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="password-toggle" data-target="password" aria-label="Show password">
                            <span class="toggle-text">Show</span>
                        </button>
                    </div>
                    <span class="field-error" id="password-error"></span>
                </div>

                <div class="input-group" id="age-group" style="display: none;">
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="25" inputmode="numeric">
                    <span class="field-error" id="age-error"></span>
                </div>

                <div class="input-group" id="signup-picture-group" style="display: none;">
                    <label for="signup-profile-pic">Profile Picture</label>
                    <div class="signup-image-field">
                        <img id="signup-profile-preview" src="/person.jpg" alt="Signup profile preview">
                        <div class="signup-image-actions">
                            <input type="file" id="signup-profile-pic" accept="image/jpeg,image/png,image/webp">
                            <button type="button" id="clear-signup-image" class="btn-outline btn-small">Remove</button>
                        </div>
                    </div>
                    <span class="input-hint">Optional. JPG, PNG, or WEBP up to 2MB.</span>
                    <span class="field-error" id="profilePicture-error"></span>
                </div>

                <button type="submit" id="auth-btn" class="btn-primary">Login</button>
            </form>

            <div class="auth-footer">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-auth">Sign Up</a>
            </div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" class="card fade-in" style="display: none;">
            <div class="profile-header">
                <h1>User Profile</h1>
                <button id="logout-btn" class="btn-outline">Logout</button>
            </div>

            <div class="profile-avatar-container">
                <div class="avatar-wrapper">
                    <img id="profile-img-preview" src="/person.jpg" alt="Profile Picture">
                    <div class="avatar-overlay" id="change-pic-btn">
                        <span>Change</span>
                    </div>
                </div>
                <button id="delete-pic-btn" class="delete-avatar-btn" title="Delete Profile Picture">×</button>
                <input type="file" id="profile-pic-input" style="display: none;" accept="image/*">
                <p class="avatar-hint">Click to change picture</p>
            </div>

            <div class="profile-info">
                <div class="info-item">
                    <span class="label">Name</span>
                    <input type="text" id="profile-name" class="editable-input">
                </div>
                <div class="info-item">
                    <span class="label">Email</span>
                    <input type="email" id="profile-email" class="editable-input" disabled>
                </div>
                <div class="info-item">
                    <span class="label">Age</span>
                    <input type="number" id="profile-age" class="editable-input" inputmode="numeric">
                </div>
                <div class="info-item">
                    <span class="label">New Password (leave blank to keep current)</span>
                    <div class="password-field">
                        <input type="password" id="profile-password" class="editable-input" placeholder="••••••••" autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="profile-password"
                            aria-label="Show new password">
                            <span class="toggle-text">Show</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button id="update-btn" class="btn-primary">Update Profile</button>
                <button id="delete-btn" class="btn-danger">Delete Account</button>
            </div>
        </div>
    </div>

    <!-- Toast container used by the frontend script for quick feedback messages. -->
    <div id="toast" class="toast"></div>

    <!-- Frontend logic for auth, profile updates, and image uploads. -->
    <script src="script.js"></script>
</body>

</html>
